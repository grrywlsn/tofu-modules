name: Post-merge version updates

on:
  push:
    branches: [main]

jobs:
  find-changed-modules:
    runs-on: ubuntu-latest
    outputs:
      modules-json: ${{ steps.scaleway-modules.outputs.modules-json }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed modules
        id: filter-modules
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ github.event.before }}
          dir_names: true
          dir_names_max_depth: 1
          dir_names_exclude_current_dir: true
          files_ignore: |
            .github/**
            .cursor/**
            scripts/**
          json: true
          escape_json: false

      - name: Keep only scaleway modules
        id: scaleway-modules
        run: |
          filtered=$(echo '${{ steps.filter-modules.outputs.all_changed_files }}' | jq '[.[] | select(startswith("scaleway-"))]')
          echo "modules-json=$filtered" >> "$GITHUB_OUTPUT"

  update-module-versions:
    needs: find-changed-modules
    runs-on: ubuntu-latest
    if: ${{ needs.find-changed-modules.outputs.modules-json != '[]' }}
    concurrency:
      group: semantic-release-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      matrix:
        module: ${{ fromJson(needs.find-changed-modules.outputs.modules-json) }}
      fail-fast: false
      max-parallel: 1
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure git for semantic release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        working-directory: ${{ matrix.module }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMANTIC_RELEASE_PACKAGE: ${{ matrix.module }}
        run: |
          cp ../.releaserc.json .releaserc.json
          npm install --no-save \
            semantic-release@22 \
            semantic-release-monorepo@8.0.2 \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/github@10.3.5
          npx semantic-release --tag-format="${{ matrix.module }}-v\${version}"

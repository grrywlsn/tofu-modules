name: Post-merge version updates

on:
  push:
    branches: [main]

jobs:
  find-changed-modules:
    runs-on: ubuntu-latest
    outputs:
      modules-json: ${{ steps.releasable-modules.outputs.modules-json }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get changed modules
        id: filter-modules
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ github.event.before }}
          dir_names: true
          dir_names_max_depth: 1
          dir_names_exclude_current_dir: true
          files_ignore: |
            .github/**
            .cursor/**
            scripts/**
          json: true
          escape_json: false

      - name: Keep only directories with versions.tf
        id: releasable-modules
        run: |
          modules='${{ steps.filter-modules.outputs.all_changed_files }}'
          filtered='[]'
          for dir in $(echo "$modules" | jq -r '.[]'); do
            if [ -f "${dir}/versions.tf" ]; then
              filtered=$(echo "$filtered" | jq -c --arg d "$dir" '. + [$d]')
            fi
          done
          echo "modules-json=$filtered" >> "$GITHUB_OUTPUT"

  update-module-versions:
    needs: find-changed-modules
    runs-on: ubuntu-latest
    if: ${{ needs.find-changed-modules.outputs.modules-json != '[]' }}
    concurrency:
      group: semantic-release-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write
    strategy:
      matrix:
        module: ${{ fromJson(needs.find-changed-modules.outputs.modules-json) }}
      fail-fast: false
      max-parallel: 1
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Configure git for semantic release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        working-directory: ${{ matrix.module }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMANTIC_RELEASE_PACKAGE: ${{ matrix.module }}
        run: |
          source ../scripts/resolve-pr-release-message.sh "${{ github.sha }}"
          bash ../scripts/prepare-semantic-release.sh
          npx semantic-release --tag-format="${{ matrix.module }}-v\${version}"

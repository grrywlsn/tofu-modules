name: Pre-merge checks

on:
  pull_request:
    branches: [main]

jobs:
  semantic-pull-request:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false

  find-changed-modules:
    runs-on: ubuntu-latest
    outputs:
      modules-json: ${{ steps.filter-modules.outputs.all_changed_files }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed modules
        id: filter-modules
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ github.event.pull_request.base.sha }}
          dir_names: true
          dir_names_max_depth: 1
          dir_names_exclude_current_dir: true
          files_ignore: |
            .github/**
            .cursor/**
            scripts/**
          json: true
          escape_json: false

  find-changed-releasable-modules:
    needs: find-changed-modules
    runs-on: ubuntu-latest
    outputs:
      modules-json: ${{ steps.releasable-modules.outputs.modules-json }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Keep only directories with versions.tf
        id: releasable-modules
        run: |
          modules='${{ needs.find-changed-modules.outputs.modules-json }}'
          filtered='[]'
          for dir in $(echo "$modules" | jq -r '.[]'); do
            if [ -f "${dir}/versions.tf" ]; then
              filtered=$(echo "$filtered" | jq -c --arg d "$dir" '. + [$d]')
            fi
          done
          echo "modules-json=$filtered" >> "$GITHUB_OUTPUT"

  preview-release:
    needs: find-changed-releasable-modules
    runs-on: ubuntu-latest
    if: ${{ needs.find-changed-releasable-modules.outputs.modules-json != '[]' }}
    permissions:
      contents: write
      pull-requests: read
    strategy:
      matrix:
        module: ${{ fromJson(needs.find-changed-releasable-modules.outputs.modules-json) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Simulate squash merge to main
        env:
          SEMANTIC_RELEASE_PR_TITLE: ${{ github.event.pull_request.title }}
          SEMANTIC_RELEASE_PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          bash scripts/simulate-squash-merge.sh \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}"

      - name: Preview semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEMANTIC_RELEASE_PR_TITLE: ${{ github.event.pull_request.title }}
          SEMANTIC_RELEASE_PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          bash scripts/preview-semantic-release.sh \
            "${{ matrix.module }}" \
            "preview-${{ matrix.module }}.json"

      - name: Upload preview
        uses: actions/upload-artifact@v7
        with:
          name: preview-${{ matrix.module }}
          path: preview-${{ matrix.module }}.json
          retention-days: 1

  comment-release-preview:
    needs: [find-changed-releasable-modules, preview-release]
    if: ${{ always() && !cancelled() && needs.find-changed-releasable-modules.outputs.modules-json != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          pattern: preview-*
          merge-multiple: true
          path: previews

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build comment body
        id: comment
        run: |
          body="$(node scripts/build-release-preview-comment.mjs previews)"
          delimiter="release_preview_$(openssl rand -hex 8)"
          {
            echo "body<<${delimiter}"
            echo "${body}"
            echo "${delimiter}"
          } >> "${GITHUB_OUTPUT}"

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.comment.outputs.body }}
          edit-mode: replace
          body-includes: "<!-- release-preview -->"

  test-module:
    needs: find-changed-releasable-modules
    runs-on: ubuntu-latest
    if: ${{ needs.find-changed-releasable-modules.outputs.modules-json != '[]' }}
    strategy:
      matrix:
        module: ${{ fromJson(needs.find-changed-releasable-modules.outputs.modules-json) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.9.0

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.55.1

      - name: Install terraform-docs
        run: |
          curl -sSLo /tmp/terraform-docs.tar.gz \
            https://github.com/terraform-docs/terraform-docs/releases/download/v0.19.0/terraform-docs-v0.19.0-$(uname)-amd64.tar.gz
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp
          sudo mv /tmp/terraform-docs /usr/local/bin/terraform-docs

      - name: Terraform Format Check
        working-directory: ${{ matrix.module }}
        run: tofu fmt -recursive -check -diff .

      - name: TFLint
        working-directory: ${{ matrix.module }}
        run: |
          tflint --init
          tflint

      - name: Update Documentation
        working-directory: ${{ matrix.module }}
        run: terraform-docs markdown table --output-file README.md --output-mode inject .

      - name: OpenTofu Validate
        working-directory: ${{ matrix.module }}
        run: |
          tofu init -backend=false
          tofu validate

      - name: OpenTofu Test
        working-directory: ${{ matrix.module }}
        run: tofu test

  all-tests-pass:
    name: all-tests-pass
    needs: [find-changed-releasable-modules, test-module]
    if: ${{ always() && !cancelled() && needs.find-changed-releasable-modules.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify module test results
        run: |
          modules='${{ needs.find-changed-releasable-modules.outputs.modules-json }}'
          if [ "$modules" = "[]" ]; then
            echo "No module directories changed; module tests not required."
            exit 0
          fi

          case "${{ needs.test-module.result }}" in
            success)
              echo "All changed modules passed checks."
              ;;
            skipped)
              echo "Module tests were skipped unexpectedly."
              exit 1
              ;;
            *)
              echo "One or more module test jobs failed."
              exit 1
              ;;
          esac
